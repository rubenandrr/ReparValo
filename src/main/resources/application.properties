# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# H2 Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:reparvalodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA & Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SQL Initialization (Loads data.sql on startup)
# ==========================================
spring.sql.init.mode=always

# ==========================================
# Spring AI - Vertex AI Gemini Configuration
# ==========================================
# Replace with your actual Google Cloud Project ID and region
spring.ai.vertex.ai.gemini.project-id=your-gcp-project-id
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-1.5-flash

# Defer datasource initialization until after JPA schema creation
spring.jpa.defer-datasource-initialization=true