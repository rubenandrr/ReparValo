# ==========================================
# Server Configuration
# ==========================================
server.port=8081

# ==========================================
# H2 Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:reparvalodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA & Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SQL Initialization (Loads data.sql on startup)
# ==========================================
spring.sql.init.mode=always

# ==========================================
# Spring AI - Google Gemini (AI Studio) Configuration
# ==========================================
# Configured via environment variable: SPRING_AI_GOOGLE_GENAI_API_KEY
spring.ai.google.genai.chat.options.model=gemini-2.0-flash

# Defer datasource initialization until after JPA schema creation
spring.jpa.defer-datasource-initialization=true